<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https:; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>ContextGate</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="background-container"></div>
  
  <div id="app">
    <div id="title-bar">
      <div class="title-left">
        <span class="app-icon">⬡</span>
        <span class="app-title">ContextGate</span>
      </div>
      <div class="title-right">
        <button id="btn-settings" class="title-btn" title="设置">⚙</button>
        <div class="window-controls">
          <button id="btn-minimize" class="window-btn" title="最小化">─</button>
          <button id="btn-maximize" class="window-btn" title="最大化">□</button>
          <button id="btn-close" class="window-btn close" title="关闭">✕</button>
        </div>
      </div>
    </div>
    
    <div id="main-content">
      <div id="sidebar">
        <h2 class="sidebar-title">项目概览</h2>
        <div class="separator"></div>
        
        <div class="project-section">
          <label id="project-label">当前项目: -</label>
          <button id="btn-select-project" class="primary-btn">选择项目</button>
        </div>
        
        <div class="separator"></div>
        
        <div class="stats-section">
          <label id="tokens-label">总 Token: 0</label>
          <label id="savings-label">本月节省: $0.00</label>
        </div>
        
        <div class="separator"></div>
        
        <button id="btn-build-context" class="primary-btn">构建上下文</button>
        
        <div class="sidebar-spacer"></div>
        
        <div class="proxy-section">
          <button id="btn-start-proxy" class="primary-btn">启动代理</button>
          <button id="btn-stop-proxy" class="secondary-btn" disabled>停止代理</button>
        </div>
      </div>
      
      <div id="log-area">
        <div id="log-header">请求日志</div>
        <div id="log-content"></div>
      </div>
    </div>
    
    <div id="bottom-bar">
      <span id="port-label">代理端口: 8000</span>
      <span id="status-label">连接状态: 已断开</span>
      <span class="spacer"></span>
      <span id="currency-label">计费币种: USD ($)</span>
    </div>
  </div>
  
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>⚙ 设置</h2>
        <button id="btn-close-settings" class="close-btn">×</button>
      </div>
      
      <div class="tabs">
        <button class="tab-btn active" data-tab="providers">提供商</button>
        <button class="tab-btn" data-tab="proxy">代理</button>
        <button class="tab-btn" data-tab="monitor">监控</button>
        <button class="tab-btn" data-tab="scanner">扫描器</button>
        <button class="tab-btn" data-tab="context">上下文</button>
        <button class="tab-btn" data-tab="currency">货币</button>
      </div>
      
      <div class="tab-content">
        <div id="tab-providers" class="tab-pane active">
          <div class="providers-layout">
            <div class="provider-list">
              <select id="provider-select" size="8"></select>
              <div class="provider-buttons">
                <button id="btn-add-provider" class="small-btn">+ 新增</button>
                <button id="btn-remove-provider" class="small-btn secondary">删除</button>
              </div>
            </div>
            <div class="provider-editor">
              <div class="form-group">
                <label>API 密钥:</label>
                <input type="password" id="provider-api-key" placeholder="输入 API 密钥...">
              </div>
              <div class="form-group">
                <label>基础 URL:</label>
                <input type="text" id="provider-base-url" placeholder="https://api.example.com/v1">
              </div>
              <div class="form-group">
                <label>模型列表 (每行一个):</label>
                <textarea id="provider-models" rows="6" placeholder="gpt-4&#10;gpt-3.5-turbo"></textarea>
              </div>
            </div>
          </div>
        </div>
        
        <div id="tab-proxy" class="tab-pane">
          <div class="form-group">
            <label>主机地址:</label>
            <input type="text" id="proxy-host" value="127.0.0.1">
          </div>
          <div class="form-group">
            <label>端口:</label>
            <input type="number" id="proxy-port" value="8080" min="1" max="65535">
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="proxy-sanitize" checked>
              启用请求清洗
            </label>
          </div>
          <div class="form-group">
            <label>默认提供商:</label>
            <input type="text" id="default-provider" value="openai">
          </div>
        </div>
        
        <div id="tab-monitor" class="tab-pane">
          <div class="form-group">
            <label>预算限制 (美元):</label>
            <input type="number" id="budget-limit" value="10" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label>警告阈值 (%):</label>
            <input type="number" id="warning-threshold" value="75" min="1" max="100">
          </div>
          <div class="form-group">
            <label>临界阈值 (%):</label>
            <input type="number" id="critical-threshold" value="90" min="1" max="100">
          </div>
          <div class="form-group">
            <label>数据库路径:</label>
            <input type="text" id="db-path" value="contextgate.db">
          </div>
        </div>
        
        <div id="tab-scanner" class="tab-pane">
          <div class="form-group">
            <label>最大文件大小 (字节):</label>
            <input type="number" id="max-file-size" value="1048576" min="1024">
          </div>
          <div class="form-group">
            <label>文件扩展名 (每行一个):</label>
            <textarea id="include-extensions" rows="8" placeholder=".py&#10;.js&#10;.ts"></textarea>
          </div>
          <div class="preset-buttons">
            <button class="small-btn" data-preset="python">Python</button>
            <button class="small-btn" data-preset="web">Web前端</button>
            <button class="small-btn" data-preset="common">常用</button>
          </div>
        </div>
        
        <div id="tab-context" class="tab-pane">
          <div class="form-group">
            <label>输出文件名:</label>
            <input type="text" id="output-file" value="full_context.txt">
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="watch-enabled" checked>
              启用文件监视 (自动更新上下文)
            </label>
          </div>
          <div class="form-group">
            <label>防抖延迟 (秒):</label>
            <input type="number" id="debounce-seconds" value="1" min="0.1" max="10" step="0.1">
          </div>
        </div>
        
        <div id="tab-currency" class="tab-pane">
          <div class="form-group">
            <label>固定货币:</label>
            <select id="fixed-currency">
              <option value="">自动检测</option>
              <option value="CNY">人民币 (CNY)</option>
              <option value="USD">美元 (USD)</option>
              <option value="EUR">欧元 (EUR)</option>
            </select>
          </div>
          <div class="form-group">
            <label>固定汇率 (可选):</label>
            <input type="number" id="fixed-rate" min="0" max="100" step="0.0001" placeholder="自动">
          </div>
          <div class="form-group">
            <label>人民币汇率 (相对于美元):</label>
            <input type="number" id="cny-rate" value="7.2" min="0.01" max="100" step="0.01">
          </div>
          <div class="form-group">
            <label>欧元汇率 (相对于美元):</label>
            <input type="number" id="eur-rate" value="0.92" min="0.01" max="100" step="0.01">
          </div>
        </div>
      </div>
      
      <div class="modal-footer">
        <button id="btn-save-settings" class="primary-btn">保存</button>
        <button id="btn-cancel-settings" class="secondary-btn">取消</button>
      </div>
    </div>
  </div>
  
  <script src="renderer.js"></script>
</body>
</html>
