name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/gui-js/package-lock.json
      
      - name: Prepare build resources
        run: |
          mkdir -p app/gui-js/build
          cp resources/icon.png app/gui-js/build/icon.png
      
      - name: Install dependencies
        working-directory: app/gui-js
        run: npm install
      
      - name: Build deb x64
        working-directory: app/gui-js
        run: npx electron-builder --linux deb --x64
      
      - name: Build deb arm64
        working-directory: app/gui-js
        run: npx electron-builder --linux deb --arm64
      
      - name: Build rpm x64
        working-directory: app/gui-js
        run: npx electron-builder --linux rpm --x64
      
      - name: Build rpm arm64
        working-directory: app/gui-js
        run: npx electron-builder --linux rpm --arm64
      
      - name: Build AppImage x64
        working-directory: app/gui-js
        run: npx electron-builder --linux AppImage --x64
      
      - name: Build AppImage arm64
        working-directory: app/gui-js
        run: npx electron-builder --linux AppImage --arm64
      
      - name: Clean temp files
        run: rm -rf app/gui-js/dist/linux-* app/gui-js/dist/*.yml
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: app/gui-js/dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/gui-js/package-lock.json
      
      - name: Prepare build resources
        shell: bash
        run: |
          mkdir -p app/gui-js/build
          cp resources/icon.png app/gui-js/build/icon.png
      
      - name: Install dependencies
        working-directory: app/gui-js
        run: npm install
      
      - name: Build Windows x64
        working-directory: app/gui-js
        run: npx electron-builder --win nsis --x64
      
      - name: Build Windows ia32
        working-directory: app/gui-js
        run: npx electron-builder --win nsis --ia32
      
      - name: Build Portable x64
        working-directory: app/gui-js
        run: npx electron-builder --win portable --x64
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            app/gui-js/dist/*.exe
            app/gui-js/dist/*.msi

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: dist/
      
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-packages
          path: dist/
      
      - name: List files
        run: ls -la dist/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
